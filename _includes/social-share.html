{% include base_path %}

<section class="page__share">
  {% if site.data.ui-text[site.locale].share_on_label %}
    <h4 class="page__share-title">{{ site.data.ui-text[site.locale].share_on_label | default: "Share on" }}</h4>
  {% endif %}

  <a href="https://www.instagram.com/" class="btn btn--instagram" title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} Instagram" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram" aria-hidden="true"></i><span> Instagram</span></a>

  <a href="https://www.facebook.com/sharer/sharer.php?u={{ base_path }}{{ page.url }}" class="btn btn--facebook" title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} Facebook" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook" aria-hidden="true"></i><span> Facebook</span></a>

  <a href="https://x.com/intent/post?text={{ page.title | url_encode }}&url={{ site.url }}{{ page.url | url_encode }}" class="btn btn--x" title="{{ site.data.ui-text[site.locale].share_on_label | default: 'Share on' }} X (Twitter)" target="_blank" rel="noopener noreferrer"><i class="fab fa-x-twitter" aria-hidden="true"></i><span> Twitter</span></a>

  <button class="btn btn--copylink" title="Copy link" onclick="navigator.clipboard.writeText(window.location.href).then(function(){ var btn = document.querySelector('.btn--copylink span'); var orig = btn.textContent; btn.textContent = ' Copied!'; setTimeout(function(){ btn.textContent = orig; }, 2000); })"><i class="fas fa-link" aria-hidden="true"></i><span> Copy Link</span></button>
</section>
